# Alembic configuration.
#
# WHY THIS FILE EXISTS
# --------------------
# Alembic is the migration tool for our SQLAlchemy schema. This ini file points
# Alembic at the migration scripts and configures its logging. The actual
# database URL is intentionally NOT hard-coded here — `alembic/env.py` injects
# it from `app.core.config` so there is one source of truth and no secrets in
# version control.

[alembic]
# Location of the migration environment (env.py) and versions/ directory.
script_location = alembic

# Prepend the project root to sys.path so `env.py` can `import app.*`
# when Alembic is invoked from the project root (and inside the container).
prepend_sys_path = .

# Use OS-native path separators.
path_separator = os

# sqlalchemy.url is deliberately left blank — set dynamically in env.py.
sqlalchemy.url =


# ----------------------------------------------------------------------------
# Logging configuration (consumed by env.py via fileConfig).
# ----------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
